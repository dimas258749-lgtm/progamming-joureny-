<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register mas DimasStore</title>
    <link href="" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #f9f9f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 2px 24px rgba(0,0,0,0.07);
            width: 100%;
            max-width: 400px;
            padding: 44px 40px 40px;
        }

        .logo {
            font-size: 20px;
            font-weight: 600;
            color: #111;
            letter-spacing: -0.3px;
            margin-bottom: 32px;
        }

        .logo span { color: #888; font-weight: 400; }

        h2 {
            font-size: 26px;
            font-weight: 600;
            color: #111;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 14px;
            color: #888;
            margin-bottom: 32px;
        }

        .field { margin-bottom: 18px; }

        .field label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #444;
            margin-bottom: 7px;
        }

        .field input {
            width: 100%;
            padding: 13px 16px;
            border: 1.5px solid #e8e8e8;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: #111;
            background: #fafafa;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }

        .field input:focus {
            border-color: #111;
            background: #fff;
        }

        .field input::placeholder { color: #bbb; }

        .field input.error { border-color: #e53935; }

        .error-mas {
            font-size: 12px;
            color: #e53935;
            margin-top: 5px;
            display: none;
        }

        .btn-register {
            width: 100%;
            padding: 14px;
            background: #111;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 6px;
        }

        .btn-register:hover { background: #333; }
        .btn-register:active { transform: scale(0.99); }

        .sep {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
        }

        .sep hr { flex: 1; border: none; border-top: 1px solid #eee; }
        .sep span { font-size: 12px; color: #bbb; }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: transparent;
            color: #111;
            border: 1.5px solid #e8e8e8;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }

        .btn-login:hover {
            border-color: #ccc;
            background: #f5f5f5;
        }

        .terms {
            font-size: 12px;
            color: #aaa;
            text-align: center;
            margin-top: 20px;
            line-height: 1.6;
        }

        .terms a {
            color: #888;
            text-decoration: underline;
            text-underline-offset: 2px;
        }
    </style>
</head>
<body>
    <form onsubmit="return register()" method="post">
        <div class="card">
        <div class="logo">Dimas<span>Store</span></div>

        <h2>Daftar</h2>
        <p class="subtitle">Buat akun baru gratis </p>

        <div class="field">
            <label for="name">Nama Lengkap</label>
            <input type="text" id="name" placeholder="Nama kamu">
        </div>

        <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="nama@email.com" required>
        </div>

        <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Min. 7 karakter">
            <p class="error-mas" id="pass-error">Password minimal 7 karakter</p>
        </div>

        <div class="field">
            <label for="confirm">Konfirmasi Password</label>
            <input type="password" id="confirm" placeholder="Ulangi password">
            <p class="error-mas" id="confirm-error">Password tidak cocok</p>
        </div>

        <button type="submit" class="btn-register">Buat Akun</button>

        <div class="sep">
            <hr><span>sudah punya akun?</span><hr>
        </div>

        <button class="btn-login" onclick="doLogin()">Masuk</button>

        <p class="terms">Dengan mendaftar, kamu menyetujui <a href="#">Syarat & Ketentuan</a> DimasStore.</p>
    </div>
    </form>
    

    <script>

        function register() {
            const pass = document.getElementById('password');
            const confirm = document.getElementById('confirm');
            const passErr = document.getElementById('pass-error');
            const confirmErr = document.getElementById('confirm-error');

            let valid = true;

            pass.classList.remove('error');
            confirm.classList.remove('error');
            passErr.style.display = 'none';
            confirmErr.style.display = 'none';

            if (pass.value.length < 7) {
                pass.classList.add('error');
                passErr.style.display = 'block';
                valid = false;
            }

            if (pass.value !== confirm.value) { 
                confirm.classList.add('error'); 
                confirmErr.style.display = 'block';
                valid = false;
            }

            if (valid) {
                window.location.href = './4.html';
            }

            return false;
        }
            function doLogin() {
                window.location.href = './login.html';
        }
    </script>

</body>
</html>
