<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email</title>
    <style>
        .contact {
            background: #222;
            color: white;
            text-align: center;
            padding: 80px 20px;
        }

        .contact h2 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .contact p {
            margin-bottom: 20px;
            color: #ccc;
        }

        .email-btn {
            display: inline-block;
            padding: 12px 25px;
            background: red;
            color: white;
            text-decoration: none;
            font-size: 16px;
            border-radius: 5px;
            transition: 0.3s;
        }

        .email-btn:hover {
            background: darkred;
        }

        .email-text {
            margin-top: 15px;
            font-size: 14px;
            color: #aaa;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 15px;
            width: 50px;
            height: 50px;
            border: none;
            background: #2B2929;
            font-size: 28px;
            font-weight: bold;
            border-radius: 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            cursor: pointer;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <section id="contact" class="contact">
    <h2>Contact Us</h2>
    <p>Jika ada pertanyaan, dan masalah, silakan hubungi kami melalui email berikut:</p>
    <button class="back-btn" onclick="pulang()">&#8592;</button>

    <a href="mailto:dimasputraq123@gmail.com" class="email-btn">
        📧 Kirim Email ke Kami
    </a>

    <p class="email-text">dimasputra1123@gmail.com</p>
</section>
<script>
     function pulang() {
            window.history.back();
        }
</script>
</body>
</html>
