<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
   <style>
        .notif {
            position: fixed;
            top: 25px;
            right: -400px;
            background: white;
            color: #111;
            padding: 16px 22px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            transition: 0.5s;
            z-index: 9999;
            min-width: 320px;
        }

        .notif.show {
            right: 20px;
        }

        .notif-icon {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #16a34a;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
        }

        .notif-icon {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #16a34a;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
        }


        .notif-text h4 {
            font-size: 15px;
            margin-bottom: 2px;
        }

        .notif-text p {
            font-size: 13px;
            color: #666;
        }
        * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
            }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f6f9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .methods {
            width: 420px;
            background: #ffffff;
            border-radius: 24px;
            padding: 35px 30px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
            border: 1px solid #e5e7eb;
        }

        .methods h3 {
            text-align: center;
            font-size: 28px;
            color: #111827;
            margin-bottom: 25px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        label {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 18px;
            margin-bottom: 14px;
            border: 1.5px solid #d1d5db;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.25s ease;
            background: #fafafa ;
            font-size: 16px;
            color: #374151;
        }

        label:hover {
            border-color: #2563eb;
            background: #f8fbff;
            transform: translateY(-2px);
        }

        input[type="radio"] {
            transform: scale(1.2);
            accent-color: #2563eb;
        }

        #payButton {
            width: 100%;
            margin-top: 15px;
            padding: 15px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            color: white;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        #payButton:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.25);
        }

        #payButton:active {
            transform: scale(0.98);
        }

        .back-btn {
            position: fixed;
            top: 17px;
            left: 15px;
            width: 50px;
            height: 50px;
            border: none;
            background: transparent;
            font-size: 28px;
            font-weight: bold;
            border-radius: 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            cursor: pointer;
            z-index: 1000;
        }
   </style>
</head>
<body>
    <button class="back-btn" onclick="pulang()">&#8592;</button>
     <div class="methods">
        <h3>Pilih Metode Pembayaran</h3>

        <label>
            <input type="radio" name="payment" value="bca">
            Transfer Bank (BCA)
        </label>
        <br><br>

        <label>
            <input type="radio" name="payment" value="gopay">
            GoPay
        </label>
        <br><br>

        <label>
            <input type="radio" name="payment" value="dana">
            DANA
        </label>
        <br><br>

        <button id="payButton" onclick="pulang">Bayar Sekarang</button>
    </div>

    <script>

        document.getElementById("payButton").addEventListener("click", function () {
            let pilihan = document.querySelector('input[name="payment"]:checked');

            if (!pilihan) {
                tampilNotifikasi("Info","Silakan pilih metode pembayaran!");
                return;
            }

            if (pilihan.value === "bca") {
               tampilNotifikasi("Berhasil", "Pembayaran Metode BCA berhasil")
            } 
            else if (pilihan.value === "gopay") {
               tampilNotifikasi("Berhasil","Pembayaran Metode Gopay berhasil")
            } 
            else if (pilihan.value === "dana") {
                tampilNotifikasi("Berhasil","Pembayaran Metode Dana berhasil")
            }
        });

        function tampilNotifikasi(Info, message) {
            const notif = document.createElement("div");
            notif.className = "notif";
            notif.innerHTML = `
            <div class="notif-icon">✓</div>
            <div class="notif-text">
                <h4>${Info}</h4>
                <p>${message}</p>
            </div>
        `;
            document.body.appendChild(notif);

            setTimeout(() => notif.classList.add("show"), 100);
            setTimeout(() => {
                notif.classList.remove("show");
                setTimeout(() => notif.remove(), 500);
            }, 2500);
        }

        function pulang() {
            window.history.back();
        }
        
    </script>

</body>
</html>
