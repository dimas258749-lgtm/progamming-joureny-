<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLEXBOX</title>
  <style>
    body{
      text-align: center;
    }
  .container{
      margin-top: 30px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 30px;
    }
    img{
      width: 300px;
      height: 300px;
      background-color: white;
      border-radius: 10px;
    }
    h1{
      font-family: 'Times New Roman', Times, serif;
      text-align: center;
      text-decoration: solid;
    }
  </style>
</head>
<body>
  <H1>GALERY FOTO</H1>
  <div class="container">
    <img src="cute.jpg" alt="p">
    <img src="cute.jpg" alt="w">
    <img src="cute.jpg" alt="o">
    <img src="cute.jpg" alt="lu">
</body>
</html>
